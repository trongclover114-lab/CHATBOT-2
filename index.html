<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Marketing Agency - Chat hỗ trợ</title>
<style>
  * { box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; margin:0; padding:0; }
  body { background:#f5f5f7; display:flex; justify-content:center; padding:30px 10px; }

  #chat-card {
    width: 420px; max-width: 100%; background:white; border-radius:14px;
    box-shadow: 0 4px 20px rgba(0,0,0,.08); overflow:hidden; border:1px solid #eee;
  }

  #chat-header {
    display:flex; align-items:center; gap:12px; padding:16px 18px;
    border-bottom:1px solid #eee;
  }
  #chat-header img {
    width:38px; height:38px; border-radius:50%;
  }
  #chat-header .title { font-weight:600; font-size:15px; color:#111; }

  #chat-body {
    min-height: 420px; display:flex; flex-direction:column;
    align-items:center; justify-content:flex-start; padding: 40px 20px 20px;
    transition: all .2s;
  }

  #chat-body.started {
    align-items:stretch; justify-content:flex-end; padding:16px;
  }

  #welcome-logo { width:70px; height:70px; border-radius:50%; margin-bottom:14px; }
  #welcome-name { font-size:17px; font-weight:700; color:#111; margin-bottom:4px; text-align:center;}
  #welcome-sub { font-size:13px; color:#777; margin-bottom:auto; }

  #messages { flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:8px; padding-bottom:10px;}

  .msg { max-width:75%; padding:9px 13px; border-radius:16px; font-size:14px; line-height:1.4; }
  .bot { background:#f0f0f0; color:#111; align-self:flex-start; }
  .me  { background: var(--accent, #1d4ed8); color:white; align-self:flex-end; }

  #start-btn {
    margin-top: 16px;
    background:white; border:1px solid #ddd; color: var(--accent, #1d4ed8);
    font-weight:600; padding:10px 26px; border-radius:22px; cursor:pointer; font-size:14px;
  }
  #start-btn:hover { background:#fafafa; }

  #tap-hint { font-size:12px; color:#999; margin-bottom:6px; }

  #footer-note {
    font-size:11px; color:#999; text-align:center; padding: 10px 16px;
    border-top:1px solid #f0f0f0;
  }
  #footer-note a { color: var(--accent, #1d4ed8); text-decoration:none; }

  #input-area { display:none; border-top:1px solid #eee; }
  #input-area.show { display:flex; }
  #chat-input { flex:1; border:none; padding:12px; font-size:14px; outline:none; }
  #send-btn { border:none; background:none; color: var(--accent, #1d4ed8); font-weight:600; padding:0 16px; cursor:pointer; }
</style>
</head>
<body>

<div id="chat-card" style="--accent:#0e8a6d">
  <div id="chat-header">
    <img src="public/icons/log1.png" alt="logo">
    <div class="title">Bright Wave Marketing</div>
  </div>

  <div id="chat-body">
    <img id="welcome-logo" src="public/icons/log1.png" alt="logo">
    <div id="welcome-name">Bright Wave Marketing</div>
    <div id="welcome-sub">Marketing Agency · Thường trả lời trong vài phút</div>

    <div id="messages"></div>

    <div id="tap-hint">Bấm để bắt đầu</div>
    <button id="start-btn" onclick="startChat()">Bắt đầu trò chuyện</button>
  </div>

  <div id="input-area">
    <input id="chat-input" type="text" placeholder="Nhập tin nhắn..." onkeypress="if(event.key==='Enter') sendMessage()">
    <button id="send-btn" onclick="sendMessage()">Gửi</button>
  </div>

  <div id="footer-note">
    Bạn đã bắt đầu trò chuyện với Bright Wave Marketing.
  </div>
</div>

<script>
const body = document.getElementById('chat-body');
const messagesEl = document.getElementById('messages');
const startBtn = document.getElementById('start-btn');
const tapHint = document.getElementById('tap-hint');
const welcomeLogo = document.getElementById('welcome-logo');
const welcomeName = document.getElementById('welcome-name');
const welcomeSub = document.getElementById('welcome-sub');
const inputArea = document.getElementById('input-area');
const input = document.getElementById('chat-input');

let started = false;

function addMessage(sender, text) {
  const div = document.createElement('div');
  div.className = 'msg ' + (sender === 'bot' ? 'bot' : 'me');
  div.textContent = text;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function startChat() {
  if (started) return;
  started = true;

  body.classList.add('started');
  welcomeLogo.style.display = 'none';
  welcomeName.style.display = 'none';
  welcomeSub.style.display = 'none';
  tapHint.style.display = 'none';
  startBtn.style.display = 'none';
  inputArea.classList.add('show');

  addMessage('bot', 'Xin chào! Cảm ơn bạn đã liên hệ với Bright Wave Marketing 👋 Mình có thể hỗ trợ gì cho bạn hôm nay?');
}

// Bộ trả lời tự động đơn giản — có thể thay bằng gọi API AI thật
function getBotReply(text) {
  const t = text.toLowerCase();
  if (t.includes('giá') || t.includes('phí') || t.includes('báo giá')) {
    return 'Bạn cho mình biết bạn cần dịch vụ nào (chạy ads, SEO, content...) để mình gửi báo giá phù hợp nhé.';
  }
  if (t.includes('dịch vụ')) {
    return 'Chúng tôi cung cấp: Quảng cáo Facebook/Google, SEO, sản xuất nội dung, quản lý fanpage. Bạn quan tâm mảng nào?';
  }
  if (t.includes('liên hệ') || t.includes('hotline')) {
    return 'Bạn có thể để lại số điện thoại hoặc email, team mình sẽ liên hệ lại trong 24h.';
  }
  if (t.includes('cảm ơn')) {
    return 'Không có gì! Rất vui được hỗ trợ bạn 😊';
  }
  return 'Mình đã ghi nhận tin nhắn của bạn. Đội ngũ tư vấn sẽ phản hồi sớm nhất nhé!';
}

function sendMessage() {
  const text = input.value.trim();
  if (!text) return;
  addMessage('me', text);
  input.value = '';
  setTimeout(() => addMessage('bot', getBotReply(text)), 600);
}
</script>

</body>
</html>
